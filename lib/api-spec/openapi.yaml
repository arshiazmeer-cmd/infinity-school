openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admission
    description: Admission form operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /admissions:
    post:
      operationId: submitAdmission
      tags: [admission]
      summary: Submit admission form
      description: Submit a new admission enquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdmissionFormInput"
      responses:
        "201":
          description: Admission submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdmissionResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AdmissionFormInput:
      type: object
      required:
        - studentName
        - gender
        - dateOfBirth
        - applyingForClass
        - previousSchoolName
        - previousClass
        - fatherName
        - motherName
        - parentMobile
        - parentEmail
        - address
        - city
        - state
        - pinCode
        - transportRequired
        - hostelRequired
      properties:
        studentName:
          type: string
        gender:
          type: string
          enum: [Male, Female, Other]
        dateOfBirth:
          type: string
        aadhaarNumber:
          type: string
        bloodGroup:
          type: string
        applyingForClass:
          type: string
        previousSchoolName:
          type: string
        previousClass:
          type: string
        fatherName:
          type: string
        motherName:
          type: string
        parentMobile:
          type: string
        alternateMobile:
          type: string
        parentEmail:
          type: string
          format: email
        address:
          type: string
        city:
          type: string
        state:
          type: string
        pinCode:
          type: string
        transportRequired:
          type: boolean
        hostelRequired:
          type: boolean
        medicalCondition:
          type: string
    AdmissionResponse:
      type: object
      required:
        - admissionId
        - message
      properties:
        admissionId:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        details:
          type: string
